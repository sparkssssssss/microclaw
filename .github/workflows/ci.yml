name: Build in Docker (Ubuntu 20.04)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:20.04

    steps:
    - uses: actions/checkout@v4

    - name: Install System Deps
      run: |
        apt-get update
        # 关键修复：加入 DEBIAN_FRONTEND=noninteractive 防止卡在选时区
        DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential libssl-dev pkg-config curl git

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Build Release
      run: cargo build --release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: microclaw-ubuntu20.04
        path: target/release/microclaw
